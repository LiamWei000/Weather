<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - Coming Back Soon</title>

    <style>
        :root {
            --bg: #020617;
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #e2e8f0;
            --subtext: #94a3b8;
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --success: #10b981;

            --radius: 24px;
            --transition: 0.25s ease;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top, #1e293b, transparent 70%);
            z-index: 0;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            will-change: transform;
        }

        body::before {
            top: -10%;
            left: 10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.4), transparent);
            animation: float 8s ease-in-out infinite;
        }

        body::after {
            bottom: -10%;
            right: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3), transparent);
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        .container {
            position: relative;
            z-index: 1;

            padding: 48px 36px;
            max-width: 480px;
            width: 90%;
            text-align: center;

            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--card);

            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);

            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);

            animation: fadeIn 0.7s ease forwards;
        }

        @supports not (backdrop-filter: blur(24px)) {
            .container {
                background: rgba(2, 6, 23, 0.85);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(.96);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 60px;
            margin-bottom: 16px;
            animation: spin 10s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(20px, 4vw, 26px);
        }

        p {
            margin: 0 0 24px;
            color: var(--subtext);
            line-height: 1.5;
        }

        .countdown {
            font-size: clamp(28px, 6vw, 38px);
            font-weight: 800;
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;

            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .countdown.done {
            background: linear-gradient(to right, #34d399, var(--success));
        }

        .progress {
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            margin: 24px 0;
            background: rgba(0, 0, 0, 0.3);
        }

        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s linear;
        }

        .btn {
            padding: 14px 32px;
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.05);
            transition: transform var(--transition), background var(--transition);
        }

        .btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 3px;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="bg-layer"></div>

    <main class="container">
        <div class="icon" id="gearIcon">⚙️</div>

        <h1>Server Maintenance</h1>
        <p id="statusText">We are currently updating our system...</p>

        <div class="countdown" id="countdown">00:00</div>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <button class="btn" id="reloadBtn">Reload</button>
    </main>

    <script>
        (() => {
            const CONFIG = {
                duration: 600,
                storageKey: "maintenanceEndTime",
                autoReload: false,
                tickRate: 1000
            };

            const DEBUG = false;

            if (DEBUG) {
                localStorage.removeItem(CONFIG.storageKey);
            }

            const el = {
                countdown: document.getElementById("countdown"),
                progress: document.getElementById("progressBar"),
                btn: document.getElementById("reloadBtn"),
                status: document.getElementById("statusText"),
                icon: document.getElementById("gearIcon")
            };

            let isActive = true;

            document.addEventListener("visibilitychange", () => {
                isActive = !document.hidden;
            });

            let endTime = Number(localStorage.getItem(CONFIG.storageKey));
            const now = Date.now();

            if (!endTime || isNaN(endTime) || endTime < now) {
                endTime = now + CONFIG.duration * 1000;
                localStorage.setItem(CONFIG.storageKey, endTime);
            }

            el.btn.onclick = () => location.reload();

            let lastSecond = null;

            // 🔥 Accurate time calculation (Date-based)
            function getTimeParts(from, to) {
                let start = new Date(from);
                let end = new Date(to);

                let y = end.getFullYear() - start.getFullYear();
                let mo = end.getMonth() - start.getMonth();
                let d = end.getDate() - start.getDate();
                let h = end.getHours() - start.getHours();
                let m = end.getMinutes() - start.getMinutes();
                let s = end.getSeconds() - start.getSeconds();

                if (s < 0) { s += 60; m--; }
                if (m < 0) { m += 60; h--; }
                if (h < 0) { h += 24; d--; }

                if (d < 0) {
                    const prevMonth = new Date(end.getFullYear(), end.getMonth(), 0);
                    d += prevMonth.getDate();
                    mo--;
                }

                if (mo < 0) {
                    mo += 12;
                    y--;
                }

                return { y, mo, d, h, m, s };
            }

            function formatTime(parts) {
                let result = "";

                if (parts.y) result += parts.y + "y ";
                if (parts.mo) result += parts.mo + "mo ";
                if (parts.d) result += parts.d + "d ";

                result +=
                    String(parts.h).padStart(2, "0") + ":" +
                    String(parts.m).padStart(2, "0") + ":" +
                    String(parts.s).padStart(2, "0");

                return result;
            }

            function updateUI(remaining) {
                const total = CONFIG.duration * 1000;
                const percent = Math.min(100, Math.max(0, (remaining / total) * 100));

                if (el.progress.style.width !== percent + "%") {
                    el.progress.style.width = percent + "%";
                }

                const seconds = Math.floor(remaining / 1000);

                if (seconds !== lastSecond) {
                    lastSecond = seconds;

                    const parts = getTimeParts(Date.now(), endTime);
                    el.countdown.textContent = formatTime(parts);
                }
            }

            function finish() {
                localStorage.removeItem(CONFIG.storageKey);

                el.countdown.textContent = "00:00:00";
                el.countdown.classList.add("done");

                el.status.textContent = "Maintenance completed";
                el.icon.style.animation = "none";

                el.btn.textContent = "Enter";

                document.body.style.cursor = "pointer";

                if (CONFIG.autoReload) {
                    setTimeout(() => location.reload(), 1000);
                }
            }

            function loop() {
                if (!isActive) {
                    requestAnimationFrame(loop);
                    return;
                }

                const remaining = Math.max(0, endTime - Date.now());

                if (remaining === 0) {
                    finish();
                    return;
                }

                updateUI(remaining);
                requestAnimationFrame(loop);
            }

            if (CONFIG.duration <= 0) {
                finish();
                return;
            }

            loop();

            window.addEventListener("storage", (e) => {
                if (e.key === CONFIG.storageKey) {
                    location.reload();
                }
            });

        })();
    </script>

</body>

</html>
